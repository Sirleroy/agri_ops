<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72">
  <!-- Farm polygon mark — irregular hexagon representing a GPS farm boundary -->
  <polygon
    points="6,32 16,8 40,4 54,20 48,54 16,60"
    fill="none"
    stroke="#22c55e"
    stroke-width="2.8"
    stroke-linejoin="round"
  />
  <!-- GPS vertex dots — captured coordinates -->
  <circle cx="16" cy="8"  r="3.2" fill="#22c55e"/>
  <circle cx="40" cy="4"  r="3.2" fill="#22c55e"/>
  <circle cx="54" cy="20" r="3.2" fill="#22c55e"/>
  <circle cx="48" cy="54" r="3.2" fill="#22c55e"/>
  <circle cx="16" cy="60" r="3.2" fill="#22c55e"/>
  <circle cx="6"  cy="32" r="3.2" fill="#22c55e"/>
  <!-- Verification checkmark inside polygon -->
  <polyline
    points="22,33 29,40 43,22"
    fill="none"
    stroke="#22c55e"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Wordmark -->
  <text
    x="72" y="47"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="30"
    letter-spacing="-0.8"
    fill="#22c55e"
  >AgriOps</text>
</svg>
