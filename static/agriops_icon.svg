    points="6,32 14,8 38,4 54,20 48,54 14,60"
    fill="none"
    stroke="#22c55e"
    stroke-width="2.8"
    stroke-linejoin="round"
  />
  <!-- GPS vertex dots -->
  <circle cx="14" cy="8"  r="3.2" fill="#22c55e"/>
  <circle cx="38" cy="4"  r="3.2" fill="#22c55e"/>
  <circle cx="54" cy="20" r="3.2" fill="#22c55e"/>
  <circle cx="48" cy="54" r="3.2" fill="#22c55e"/>
  <circle cx="14" cy="60" r="3.2" fill="#22c55e"/>
  <circle cx="6"  cy="32" r="3.2" fill="#22c55e"/>
  <!-- Verification checkmark -->
  <polyline
    points="20,33 28,41 44,22"
    fill="none"
    stroke="#22c55e"
    stroke-width="2.8"
    stroke-linecap="round"
