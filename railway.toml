[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python manage.py collectstatic --noinput && python manage.py migrate && gunicorn agri_ops_project.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"
healthcheckPath = "/login/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
