<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OTP Setup — AgriOps Ops</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }
    h1 { color: #f1f5f9; font-size: 1.2rem; margin-bottom: 0.5rem; }
    p { color: #94a3b8; font-size: 0.85rem; margin-bottom: 1.5rem; line-height: 1.6; }
    .qr {
      background: white;
      display: inline-block;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }
    .qr svg { display: block; width: 180px; height: 180px; }
    label { display: block; color: #94a3b8; font-size: 0.8rem; margin-bottom: 0.4rem; text-align: left; }
    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      padding: 0.65rem 0.9rem;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-align: center;
      margin-bottom: 1.25rem;
      outline: none;
    }
    input:focus { border-color: #16a34a; }
    button {
      width: 100%;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #15803d; }
    .error {
      background: #450a0a;
      border: 1px solid #991b1b;
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      text-align: left;
    }
    .step {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .step p { color: #64748b; margin-bottom: 0; font-size: 0.82rem; }
    .step strong { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set Up Two-Factor Auth</h1>
    <p>Scan this QR code with Google Authenticator or Authy. This is a one-time setup.</p>

    <div class="qr">{{ qr_svg|safe }}</div>

    <div class="step">
      <strong>Steps:</strong>
      <p>1. Open your authenticator app<br>
         2. Tap + → Scan QR code<br>
         3. Enter the 6-digit code below to confirm</p>
    </div>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="token">Verification Code</label>
      <input type="text" id="token" name="token" maxlength="6"
             inputmode="numeric" pattern="[0-9]*" autofocus required
             placeholder="000000">
      <button type="submit">Confirm &amp; Activate</button>
    </form>
  </div>
</body>
</html>
