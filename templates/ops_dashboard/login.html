<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriOps Ops Access</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo span {
      display: inline-block;
      background: #16a34a;
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      text-transform: uppercase;
    }
    h1 {
      color: #f1f5f9;
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    p.sub {
      color: #64748b;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 2rem;
    }
    label {
      display: block;
      color: #94a3b8;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
    }
    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      padding: 0.65rem 0.9rem;
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #16a34a; }
    button {
      width: 100%;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #15803d; }
    .error {
      background: #450a0a;
      border: 1px solid #991b1b;
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
    }
    .footer {
      text-align: center;
      color: #334155;
      font-size: 0.75rem;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>AgriOps Ops</span></div>
    <h1>Operator Access</h1>
    <p class="sub">Restricted area. Authorised personnel only.</p>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="off" autofocus required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Continue</button>
    </form>
    <div class="footer">AgriOps &mdash; Internal Operations</div>
  </div>
</body>
</html>
