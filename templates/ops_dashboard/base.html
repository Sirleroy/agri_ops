<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AgriOps Ops{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #f1f5f9; --muted: #94a3b8; --dim: #64748b;
      --green: #16a34a; --green-dark: #15803d;
      --red: #dc2626; --yellow: #ca8a04; --blue: #2563eb;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; display: flex; min-height: 100vh; }
    /* Sidebar */
    .sidebar {
      width: 220px; min-height: 100vh; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
    }
    .sidebar-logo {
      padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border);
      font-weight: 700; font-size: 0.9rem; color: var(--text);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .sidebar-logo span {
      background: var(--green); color: white; font-size: 0.65rem;
      padding: 0.15rem 0.5rem; border-radius: 999px; text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .sidebar nav { padding: 1rem 0; flex: 1; }
    .sidebar nav a {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 1.5rem; color: var(--muted); text-decoration: none;
      font-size: 0.85rem; transition: all 0.15s;
    }
    .sidebar nav a:hover, .sidebar nav a.active {
      color: var(--text); background: rgba(255,255,255,0.05);
    }
    .sidebar nav a.active { border-left: 3px solid var(--green); padding-left: calc(1.5rem - 3px); }
    .sidebar-footer {
      padding: 1rem 1.5rem; border-top: 1px solid var(--border);
      font-size: 0.75rem; color: var(--dim);
    }
    .sidebar-footer a { color: var(--dim); text-decoration: none; }
    .sidebar-footer a:hover { color: var(--red); }
    /* Main */
    .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0.9rem 2rem; display: flex; align-items: center;
      justify-content: space-between;
    }
    .topbar h1 { font-size: 1rem; font-weight: 600; color: var(--text); }
    .topbar .badge {
      background: rgba(22,163,74,0.15); color: var(--green);
      font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 999px;
      border: 1px solid rgba(22,163,74,0.3);
    }
    .content { padding: 2rem; flex: 1; }
    /* Cards */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 1.5rem;
    }
    .card-title { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .card-value { font-size: 2rem; font-weight: 700; color: var(--text); }
    .card-sub { font-size: 0.8rem; color: var(--dim); margin-top: 0.25rem; }
    /* Grid */
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { color: var(--muted); font-weight: 500; text-align: left; padding: 0.6rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 0.65rem 1rem; border-bottom: 1px solid rgba(51,65,85,0.5); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    /* Status badges */
    .badge-ok { background: rgba(22,163,74,0.15); color: #4ade80; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; }
    .badge-error { background: rgba(220,38,38,0.15); color: #f87171; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; }
    .badge-warning { background: rgba(202,138,4,0.15); color: #facc15; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; }
    /* Section heading */
    .section-title { font-size: 0.85rem; font-weight: 600; color: var(--muted); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      AgriOps <span>Ops</span>
    </div>
    <nav>
      <a href="/ops/" class="{% block nav_overview %}{% endblock %}">📊 Overview</a>
      <a href="/ops/tenants/" class="{% block nav_tenants %}{% endblock %}">🏢 Tenants</a>
      <a href="/ops/metrics/" class="{% block nav_metrics %}{% endblock %}">📈 Metrics</a>
      <a href="/ops/security/" class="{% block nav_security %}{% endblock %}">🔒 Security</a>
      <a href="/ops/health/" class="{% block nav_health %}{% endblock %}">💚 Health</a>
    </nav>
    <div class="sidebar-footer">
      {{ request.user.username }}<br>
      <a href="/ops-access/9f3k/logout/">Sign out</a>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <h1>{% block page_title %}Dashboard{% endblock %}</h1>
      <span class="badge">● Live</span>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
