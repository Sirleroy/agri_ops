{% extends "admin_panel/base.html" %}
{% block title %}Company Settings{% endblock %}
{% block nav_company %}active{% endblock %}
{% block page_title %}Company Settings{% endblock %}

{% block content %}
<div class="card" style="max-width:600px;">
  <div class="section-title">Company Details</div>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Company Name *</label>
      <input type="text" name="name" value="{{ company.name }}" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" value="{{ company.email }}">
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="text" name="phone" value="{{ company.phone }}">
    </div>
    <div class="form-group">
      <label>City</label>
      <input type="text" name="city" value="{{ company.city }}">
    </div>
    <div class="form-group">
      <label>Address</label>
      <textarea name="address" rows="3">{{ company.address }}</textarea>
    </div>
    <div class="form-group">
      <label>NEPC Registration Number</label>
      <input type="text" name="nepc_registration_number" value="{{ company.nepc_registration_number }}">
    </div>
    <div class="form-group" style="margin-top:0.5rem;">
      <label style="color:var(--dim);">Plan Tier</label>
      <input type="text" value="{{ company.get_plan_tier_display }}" disabled style="color:var(--dim);cursor:not-allowed;">
    </div>
    <button type="submit" class="btn btn-green">Save Changes</button>
  </form>
</div>
{% endblock %}
