<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check Your Email — AgriOps</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      '#0a0f1a',
            surface: '#111827',
            card:    '#131f2e',
            border:  '#1e2d40',
            green:   '#22c55e',
          },
          fontFamily: {
            sans: ['Syne', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans text-slate-100 min-h-screen bg-bg flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="flex items-center gap-3 mb-8">
      <div class="w-9 h-9 bg-green rounded-xl flex items-center justify-center text-bg font-black text-sm">A</div>
      <div>
        <p class="font-bold text-slate-100 tracking-wide leading-tight">AgriOps</p>
        <p class="text-xs font-mono text-slate-500">Supply Chain Intelligence</p>
      </div>
    </div>

    <div class="bg-card border border-border rounded-2xl p-8 text-center">
      <div class="w-12 h-12 bg-green/10 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-6 h-6 text-green-400" fill="none" stroke="#22c55e" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <h1 class="text-lg font-bold text-slate-100 mb-2">Check your inbox</h1>
      <p class="text-sm text-slate-500 leading-relaxed">
        If an account exists for that email address, we have sent a password reset link. The link is valid for 24 hours.
      </p>
      <p class="text-xs font-mono text-slate-600 mt-4">Check your spam folder if you do not see it.</p>
    </div>

    <p class="text-center text-xs font-mono text-slate-600 mt-6">
      <a href="/login/" class="hover:text-slate-400 transition-colors">Back to Sign In</a>
    </p>

  </div>
</body>
</html>
