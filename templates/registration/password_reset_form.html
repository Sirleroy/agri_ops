<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — AgriOps</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      '#0a0f1a',
            surface: '#111827',
            card:    '#131f2e',
            border:  '#1e2d40',
            green:   '#22c55e',
            'green-dim': '#16a34a',
          },
          fontFamily: {
            sans: ['Syne', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        }
      }
    }
  </script>
  <style>
    body { background-color: #0a0f1a; }
    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 30px #131f2e inset !important;
      -webkit-text-fill-color: #f1f5f9 !important;
    }
  </style>
</head>

<body class="font-sans text-slate-100 min-h-screen bg-bg flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="flex items-center gap-3 mb-8">
      <div class="w-9 h-9 bg-green rounded-xl flex items-center justify-center text-bg font-black text-sm">A</div>
      <div>
        <p class="font-bold text-slate-100 tracking-wide leading-tight">AgriOps</p>
        <p class="text-xs font-mono text-slate-500">Supply Chain Intelligence</p>
      </div>
    </div>

    <div class="bg-card border border-border rounded-2xl p-8">
      <h1 class="text-lg font-bold text-slate-100 mb-1">Reset your password</h1>
      <p class="text-sm text-slate-500 mb-6">Enter your email address and we will send you a reset link.</p>

      <form method="post">
        {% csrf_token %}
        <div class="mb-6">
          <label class="block text-xs font-mono text-slate-400 mb-2 tracking-wide uppercase">Email Address</label>
          <input
            type="email"
            name="email"
            autofocus
            required
            class="w-full bg-surface border border-border focus:border-green rounded-lg px-4 py-3 text-sm text-slate-100 placeholder-slate-600 outline-none transition-colors"
            placeholder="you@yourcompany.com"
          />
        </div>
        <button type="submit" class="w-full bg-green hover:bg-green-dim text-bg font-bold text-sm py-3 rounded-lg transition-colors tracking-wide">
          Send Reset Link
        </button>
      </form>
    </div>

    <p class="text-center text-xs font-mono text-slate-600 mt-6">
      <a href="/login/" class="hover:text-slate-400 transition-colors">Back to Sign In</a>
    </p>

  </div>
</body>
</html>
