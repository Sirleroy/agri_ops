<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Reset Complete — AgriOps</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      '#0a0f1a',
            surface: '#111827',
            card:    '#131f2e',
            border:  '#1e2d40',
            green:   '#22c55e',
            'green-dim': '#16a34a',
          },
          fontFamily: {
            sans: ['Syne', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans text-slate-100 min-h-screen bg-bg flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="flex items-center gap-3 mb-8">
      <div class="w-9 h-9 bg-green rounded-xl flex items-center justify-center text-bg font-black text-sm">A</div>
      <div>
        <p class="font-bold text-slate-100 tracking-wide leading-tight">AgriOps</p>
        <p class="text-xs font-mono text-slate-500">Supply Chain Intelligence</p>
      </div>
    </div>

    <div class="bg-card border border-border rounded-2xl p-8 text-center">
      <div class="w-12 h-12 bg-green/10 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-6 h-6" fill="none" stroke="#22c55e" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h1 class="text-lg font-bold text-slate-100 mb-2">Password updated</h1>
      <p class="text-sm text-slate-500 leading-relaxed mb-6">
        Your password has been reset successfully. You can now sign in with your new password.
      </p>
      <a href="/login/" class="block w-full bg-green hover:bg-green-dim text-bg font-bold text-sm py-3 rounded-lg transition-colors tracking-wide text-center">
        Sign In
      </a>
    </div>

  </div>
</body>
</html>
