name: AgriOps Hardened Audit (Shadow)

on:
  push:
    branches: [ feature/hardened-ci ]

jobs:
  audit_and_chaos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Geo-Spatial Linux Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils libproj-dev gdal-bin

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django playwright pytest-playwright
          npx playwright install --with-deps chromium

      - name: Run GeoJSON Chaos Suite
        run: |
          # This specifically targets the hardening logic we wrote
          pytest apps/suppliers/tests/test_geojson_validation.py -v

      - name: Run Playwright E2E (UI Integrity)
        run: |
          npx playwright test
