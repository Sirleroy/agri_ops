name: AgriOps Hardened Audit (Shadow)

on:
  push:
    branches: [ feature/hardened-ci ]

jobs:
  audit_and_chaos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django

      - name: Run GeoJSON Chaos Suite
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          SECRET_KEY: ci-only-not-a-real-secret
          DATABASE_URL: sqlite:///ci_test.db
          DEBUG: "True"
          ALLOWED_HOSTS: localhost
        run: |
          python -m pytest apps/suppliers/tests/test_geojson_validation.py -v -ra --tb=short
